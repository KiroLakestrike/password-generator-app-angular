<label>
    @if (config.label.location === 'before') {
        <span>{{ config.label.text}}</span>
    }
    <input 
        type="checkbox" 
        [name]="config.name" 
        [id]="config.id"
        [checked]="checked"
        >
    @if (config.label.location === 'after') {
    <span>{{ config.label.text}}</span>
    }
</label>
