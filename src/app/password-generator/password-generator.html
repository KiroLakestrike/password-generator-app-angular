<div class="app-container">
    <h1>Password Generator</h1>
    <main>
        <div class="generator-container">
          <input type="text" class="password-output" placeholder="P4$5W0rD!">
        </div>
        <div class="generator-container">
            <app-generator-form
              (passwordLengthChange)="onPasswordLengthChange($event)"
              (checkboxChange)="onCheckboxChange($event)">
            ></app-generator-form>
        </div>
    </main>
</div>
