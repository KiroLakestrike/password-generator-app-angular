@for (checkbox of checkboxes; track trackByCheckboxId($index, checkbox)) {

    [checked]="getCheckedState(checkbox.name)()"
    (change)="toggleCheckbox($event, checkbox.name)">
  </app-input-checkbox>
}

</div>

</div>
